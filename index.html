<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEC/BTC Ratio Terminal</title>
  <meta name="description" content="Live BTC to ZCash ratio tracker with historical charts">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --gold: #d4a017;
      --gold-bright: #f5c842;
      --gold-dim: #8a6a0a;
      --gold-glow: rgba(212, 160, 23, 0.4);
      --gold-subtle: rgba(212, 160, 23, 0.08);
      --bg: #0a0a0a;
      --bg-panel: #0e0e0e;
      --border: #1a1a1a;
      --border-gold: rgba(212, 160, 23, 0.25);
      --text-dim: #444;
      --grid-size: 4px;
      --border-thick: 2px;
      --radius-lg: 12px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(212,160,23,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,160,23,0.03) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      font-family: 'VT323', monospace;
      color: var(--gold);
      text-transform: uppercase;
      line-height: 1.2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: none;
    }

    /* ── Status Bar ─────────────────────────────── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      border-bottom: var(--border-thick) solid var(--border-gold);
      font-size: 1.2rem;
      background: linear-gradient(180deg, rgba(212,160,23,0.04) 0%, transparent 100%);
    }

    .status-left, .status-right { display: flex; align-items: center; gap: 12px; }
    .status-center { color: var(--gold-bright); letter-spacing: 3px; font-size: 1.3rem; }

    .icon-signal { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
    .icon-signal div { background-color: var(--gold); width: 4px; }
    .icon-signal div:nth-child(1) { height: 4px; }
    .icon-signal div:nth-child(2) { height: 8px; }
    .icon-signal div:nth-child(3) { height: 12px; }
    .icon-signal div:nth-child(4) { height: 16px; }

    .icon-battery {
      width: 30px; height: 14px;
      border: 2px solid var(--gold); position: relative; padding: 1px;
    }
    .icon-battery::after {
      content: ''; position: absolute; right: -4px; top: 2px;
      width: 2px; height: 6px; background-color: var(--gold);
    }
    .icon-battery-fill { width: 80%; height: 100%; background-color: var(--gold); }

    /* ── Main Layout ────────────────────────────── */
    .container {
      flex: 1; width: 100%; max-width: 1400px;
      margin: 0 auto; padding: 24px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
    }

    /* ── Panels ─────────────────────────────────── */
    .panel {
      border: var(--border-thick) solid var(--border-gold);
      border-radius: var(--radius-lg);
      padding: 24px;
      background: var(--bg-panel);
      display: flex; flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .panel-header {
      border-bottom: var(--border-thick) solid var(--border-gold);
      padding-bottom: 16px; margin-bottom: 16px;
      position: relative;
    }

    .panel-header h2 {
      font-size: 2rem; letter-spacing: 3px;
      color: var(--gold-bright);
      text-shadow: 0 0 20px var(--gold-glow);
    }
    .panel-header p { font-size: 1.1rem; color: var(--gold-dim); margin-top: 4px; }

    /* ── Big Number ──────────────────────────────── */
    .metric-huge {
      font-size: 4.5rem; letter-spacing: 4px;
      display: block; margin: 16px 0 8px;
      color: var(--gold-bright);
      text-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(212,160,23,0.15);
    }

    .metric-huge.loading {
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .metric-sub {
      font-size: 1.2rem; color: var(--gold-dim);
      letter-spacing: 1px; margin-bottom: 8px;
    }

    /* ── Time Toggles ───────────────────────────── */
    .time-toggles {
      display: flex; gap: 8px; margin-top: 20px; margin-bottom: 16px;
    }

    .time-btn {
      background: transparent;
      border: var(--border-thick) solid var(--border-gold);
      border-radius: var(--radius-sm);
      color: var(--gold-dim);
      font-family: 'VT323', monospace;
      font-size: 1.2rem; text-transform: uppercase;
      padding: 6px 16px; cursor: pointer;
      transition: all 0.15s ease;
    }

    .time-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .time-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
      box-shadow: 0 0 12px var(--gold-glow);
    }

    /* ── Chart ──────────────────────────────────── */
    .chart-wrap {
      flex: 1; position: relative; min-height: 200px;
    }

    .chart-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 2; pointer-events: none;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .chart-loading.visible { opacity: 1; }

    .chart-loading-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold-dim); margin: 0 4px;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .chart-loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .chart-loading-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* ── Logic Boxes ────────────────────────────── */
    .logic-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-top: auto; padding-top: 20px;
    }

    .logic-box {
      border: var(--border-thick) solid var(--border-gold);
      border-radius: var(--radius-sm);
      padding: 16px; display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 8px;
    }

    .logic-box h3 { font-size: 1.4rem; color: var(--gold-bright); letter-spacing: 1px; }
    .logic-box p { font-size: 1rem; color: var(--gold-dim); }

    .icon-arrow-up, .icon-arrow-down {
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
    }
    .icon-arrow-up { border-bottom: 14px solid var(--gold); }
    .icon-arrow-down { border-top: 14px solid var(--gold); }

    /* ── Dock / Footer ──────────────────────────── */
    .dock {
      border-top: var(--border-thick) solid var(--border-gold);
      padding: 16px 24px;
      display: flex; justify-content: center; gap: 12px;
      background: linear-gradient(0deg, rgba(212,160,23,0.03) 0%, transparent 100%);
    }

    .dock-label {
      font-size: 1rem; color: var(--gold-dim);
      letter-spacing: 2px; padding: 8px 16px;
      display: flex; align-items: center;
    }

    .dock-label a {
      color: var(--gold-dim); text-decoration: none;
      transition: color 0.2s;
    }
    .dock-label a:hover { color: var(--gold); }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 1024px) {
      .container { grid-template-columns: 1fr; }
      .metric-huge { font-size: 3.5rem; }
    }

    @media (max-width: 600px) {
      .container { padding: 12px; gap: 16px; }
      .panel { padding: 16px; }
      .metric-huge { font-size: 2.5rem; }
      .status-center { display: none; }
      .logic-grid { grid-template-columns: 1fr; }
      .time-btn { padding: 4px 10px; font-size: 1.1rem; }
    }

    /* ── Fade In ────────────────────────────────── */
    .fade-in {
      opacity: 0; transform: translateY(6px);
      animation: fadeUp 0.6s ease forwards;
    }
    .fade-in-d1 { animation-delay: 0.05s; }
    .fade-in-d2 { animation-delay: 0.15s; }
    .fade-in-d3 { animation-delay: 0.25s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Pixel Wave ────────────────────────────── */
    #pixelWave {
      width: 100%;
      height: 60px;
      display: block;
      opacity: 0.35;
    }
  </style>
</head>
<body>

  <header class="status-bar fade-in">
    <div class="status-left">
      <div class="icon-signal"><div></div><div></div><div></div><div></div></div>
      <span>SYS_TERMINAL</span>
    </div>
    <div class="status-center">ZEC / BTC METRICS</div>
    <div class="status-right">
      <span id="clock">--:--</span>
      <div class="icon-battery"><div class="icon-battery-fill"></div></div>
    </div>
  </header>

  <main class="container">
    <!-- LEFT: Ratio Panel -->
    <section class="hero-section fade-in fade-in-d1" style="display:flex;flex-direction:column;gap:24px;">
      <div class="panel" style="flex:1;">
        <div class="panel-header">
          <h2>THE RATIO</h2>
          <p>How much ZCash can you buy with 1 BTC?</p>
        </div>
        <span class="metric-huge loading" id="ratioValue">---</span>
        <p class="metric-sub" id="ratioSub">ZEC PER BTC</p>

        <div class="time-toggles" id="ratioToggles">
          <button class="time-btn" data-range="1W">1W</button>
          <button class="time-btn" data-range="1M">1M</button>
          <button class="time-btn active" data-range="1Y">1Y</button>
          <button class="time-btn" data-range="MAX">MAX</button>
        </div>

        <div class="chart-wrap">
          <div class="chart-loading" id="ratioChartLoading">
            <div class="chart-loading-dot"></div>
            <div class="chart-loading-dot"></div>
            <div class="chart-loading-dot"></div>
          </div>
          <canvas id="ratioChart"></canvas>
        </div>
      </div>

      <div class="logic-grid">
        <div class="logic-box">
          <div class="icon-arrow-up"></div>
          <h3>RATIO UP</h3>
          <p>ZEC is cheaper relative to BTC</p>
        </div>
        <div class="logic-box">
          <div class="icon-arrow-down"></div>
          <h3>RATIO DOWN</h3>
          <p>ZEC is gaining ground on BTC</p>
        </div>
      </div>
    </section>

    <!-- RIGHT: ZEC Price Panel -->
    <section class="panel fade-in fade-in-d2">
      <div class="panel-header">
        <h2>ZEC PRICE</h2>
        <p>Current ZCash Market Price (USD)</p>
      </div>
      <span class="metric-huge loading" id="priceValue">---</span>
      <p class="metric-sub" id="priceSub">USD PER ZEC</p>

      <div class="time-toggles" id="priceToggles">
        <button class="time-btn" data-range="1W">1W</button>
        <button class="time-btn" data-range="1M">1M</button>
        <button class="time-btn active" data-range="1Y">1Y</button>
        <button class="time-btn" data-range="MAX">MAX</button>
      </div>

      <div class="chart-wrap">
        <div class="chart-loading" id="priceChartLoading">
          <div class="chart-loading-dot"></div>
          <div class="chart-loading-dot"></div>
          <div class="chart-loading-dot"></div>
        </div>
        <canvas id="priceChart"></canvas>
      </div>
    </section>
  </main>

  <!-- Pixel Wave -->
  <canvas id="pixelWave"></canvas>

  <footer class="dock fade-in fade-in-d3">
    <div class="dock-label">
      Data from <a href="https://defillama.com" target="_blank" rel="noopener">&nbsp;DeFiLlama</a>
    </div>
  </footer>

  <script>
    // ── localStorage Cache ───────────────────────
    const CACHE_KEY = 'zecratio_v1';
    const CACHE_TTL = 5 * 60 * 1000; // 5 minutes

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (Date.now() - parsed.ts > CACHE_TTL) return null;
        return parsed.data;
      } catch { return null; }
    }

    function saveToStorage(data) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
      } catch {}
    }

    // ── State ─────────────────────────────────────
    const cache = { ratio: {}, price: {} };
    let ratioChart = null, priceChart = null;
    let currentRatioRange = '1Y', currentPriceRange = '1Y';

    // ── DOM ───────────────────────────────────────
    const ratioEl = document.getElementById('ratioValue');
    const priceEl = document.getElementById('priceValue');
    const ratioChartCanvas = document.getElementById('ratioChart');
    const priceChartCanvas = document.getElementById('priceChart');
    const ratioCtx = ratioChartCanvas.getContext('2d');
    const priceCtx = priceChartCanvas.getContext('2d');
    const ratioLoading = document.getElementById('ratioChartLoading');
    const priceLoading = document.getElementById('priceChartLoading');
    const clockEl = document.getElementById('clock');

    // ── Clock ─────────────────────────────────────
    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString('en-US', {
        hour: '2-digit', minute: '2-digit', hour12: false
      });
    }
    updateClock();
    setInterval(updateClock, 10000);

    // ── API ───────────────────────────────────────
    const API = 'https://coins.llama.fi';

    async function fetchCurrentPrices() {
      try {
        const res = await fetch(`${API}/prices/current/coingecko:bitcoin,coingecko:zcash`);
        const data = await res.json();
        const btc = data.coins['coingecko:bitcoin'].price;
        const zec = data.coins['coingecko:zcash'].price;
        return { btc, zec, ratio: btc / zec };
      } catch (e) {
        console.error('Price fetch failed:', e);
        return null;
      }
    }

    function getRangeParams(range) {
      const now = Math.floor(Date.now() / 1000);
      switch (range) {
        case '1W':  return { start: now - 7 * 86400, period: '1h', span: 168 };
        case '1M':  return { start: now - 30 * 86400, period: '4h', span: 180 };
        case '1Y':  return { start: now - 365 * 86400, period: '1d', span: 365 };
        case 'MAX': return { start: 1477526400, period: '1w', span: Math.ceil((now - 1477526400) / (7 * 86400)) };
        default:    return { start: now - 365 * 86400, period: '1d', span: 365 };
      }
    }

    // Single combined request per range (1 call instead of 2)
    async function fetchHistorical(range) {
      const { start, period, span } = getRangeParams(range);
      try {
        const res = await fetch(
          `${API}/chart/coingecko:bitcoin,coingecko:zcash?start=${start}&period=${period}&span=${span}`
        );
        const data = await res.json();
        const btcPrices = data.coins['coingecko:bitcoin'].prices;
        const zecPrices = data.coins['coingecko:zcash'].prices;

        const zecMap = new Map();
        zecPrices.forEach(p => zecMap.set(p.timestamp, p.price));

        const ratioData = [], priceData = [];
        btcPrices.forEach(bp => {
          const zp = zecMap.get(bp.timestamp);
          if (zp && zp > 0) {
            ratioData.push({ timestamp: bp.timestamp, value: bp.price / zp });
            priceData.push({ timestamp: bp.timestamp, value: zp });
          }
        });

        return { ratio: ratioData, price: priceData };
      } catch (e) {
        console.error('Historical fetch failed:', e);
        return { ratio: [], price: [] };
      }
    }

    // ── Number Animation ─────────────────────────
    function animateNumber(el, target, prefix = '', suffix = '', decimals = 2) {
      el.classList.remove('loading');
      const start = performance.now();
      const duration = 1200;
      function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = prefix + (target * eased).toFixed(decimals) + suffix;
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // ── Chart Builder ────────────────────────────
    function formatDate(ts, range) {
      const d = new Date(ts * 1000);
      if (range === '1W' || range === '1M')
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    }

    function buildChart(canvasCtx, canvasEl, data, range, tooltipSuffix, existingChart) {
      const labels = data.map(d => formatDate(d.timestamp, range));
      const values = data.map(d => d.value);

      const grad = canvasCtx.createLinearGradient(0, 0, 0, canvasEl.parentElement.clientHeight);
      grad.addColorStop(0, 'rgba(212, 160, 23, 0.18)');
      grad.addColorStop(0.5, 'rgba(212, 160, 23, 0.04)');
      grad.addColorStop(1, 'rgba(212, 160, 23, 0)');

      const chartData = {
        labels,
        datasets: [{
          data: values,
          borderColor: '#d4a017',
          borderWidth: 1.5,
          backgroundColor: grad,
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          pointHoverRadius: 4,
          pointHoverBackgroundColor: '#f5c842',
          pointHoverBorderColor: '#0a0a0a',
          pointHoverBorderWidth: 2,
        }]
      };

      const opts = {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(10, 10, 10, 0.95)',
            titleColor: '#8a6a0a',
            bodyColor: '#f5c842',
            titleFont: { family: 'VT323', size: 14 },
            bodyFont: { family: 'VT323', size: 16 },
            padding: { top: 8, bottom: 8, left: 12, right: 12 },
            borderColor: 'rgba(212,160,23,0.25)',
            borderWidth: 1,
            cornerRadius: 6,
            displayColors: false,
            callbacks: {
              title(items) {
                if (!items.length) return '';
                const ts = data[items[0].dataIndex].timestamp;
                return new Date(ts * 1000).toLocaleDateString('en-US', {
                  month: 'short', day: 'numeric', year: 'numeric'
                });
              },
              label(item) {
                return item.parsed.y.toFixed(2) + ' ' + tooltipSuffix;
              }
            }
          }
        },
        scales: {
          x: {
            display: true,
            grid: { display: false },
            border: { display: false },
            ticks: {
              color: '#3a3000',
              font: { family: 'VT323', size: 13 },
              maxTicksLimit: 6,
              maxRotation: 0,
              padding: 6,
            }
          },
          y: {
            display: true,
            position: 'right',
            grid: { display: false },
            border: { display: false },
            ticks: {
              color: '#2a2000',
              font: { family: 'VT323', size: 13 },
              maxTicksLimit: 4,
              padding: 6,
              callback: v => v.toFixed(v >= 100 ? 0 : 2)
            }
          }
        },
        animation: { duration: 500, easing: 'easeOutCubic' }
      };

      if (existingChart) {
        existingChart.data = chartData;
        existingChart.options = opts;
        existingChart.update('default');
        return existingChart;
      }
      return new Chart(canvasCtx, { type: 'line', data: chartData, options: opts });
    }

    // ── Load Chart from Cache ────────────────────
    function showRatioChart(range) {
      currentRatioRange = range;
      setActive('ratioToggles', range);
      const data = cache.ratio[range];
      if (!data || !data.length) {
        ratioLoading.classList.add('visible');
        return;
      }
      ratioLoading.classList.remove('visible');
      ratioChart = buildChart(ratioCtx, ratioChartCanvas, data, range, 'ZEC/BTC', ratioChart);
    }

    function showPriceChart(range) {
      currentPriceRange = range;
      setActive('priceToggles', range);
      const data = cache.price[range];
      if (!data || !data.length) {
        priceLoading.classList.add('visible');
        return;
      }
      priceLoading.classList.remove('visible');
      priceChart = buildChart(priceCtx, priceChartCanvas, data, range, 'USD', priceChart);
    }

    function setActive(containerId, range) {
      document.querySelectorAll(`#${containerId} .time-btn`).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.range === range);
      });
    }

    // ── Button Handlers ──────────────────────────
    document.querySelectorAll('#ratioToggles .time-btn').forEach(btn => {
      btn.addEventListener('click', () => showRatioChart(btn.dataset.range));
    });
    document.querySelectorAll('#priceToggles .time-btn').forEach(btn => {
      btn.addEventListener('click', () => showPriceChart(btn.dataset.range));
    });

    // ── Init ─────────────────────────────────────
    async function init() {
      ratioLoading.classList.add('visible');
      priceLoading.classList.add('visible');

      // 1. Try localStorage cache for instant render
      const stored = loadFromStorage();
      if (stored) {
        Object.assign(cache.ratio, stored.ratio);
        Object.assign(cache.price, stored.price);
        // Render 1Y immediately from cache
        showRatioChart('1Y');
        showPriceChart('1Y');
      }

      // 2. Fetch current prices + 1Y data in parallel (fastest visible result)
      const [prices, data1Y] = await Promise.all([
        fetchCurrentPrices(),
        fetchHistorical('1Y')
      ]);

      // Update big numbers
      if (prices) {
        animateNumber(ratioEl, prices.ratio, '', '', 2);
        animateNumber(priceEl, prices.zec, '$', '', 2);
      } else {
        ratioEl.classList.remove('loading');
        priceEl.classList.remove('loading');
        ratioEl.textContent = '---';
        priceEl.textContent = '---';
      }

      // Update 1Y with fresh data
      cache.ratio['1Y'] = data1Y.ratio;
      cache.price['1Y'] = data1Y.price;
      showRatioChart('1Y');
      showPriceChart('1Y');

      // 3. Lazy prefetch remaining ranges in background (no await)
      Promise.all(['1W', '1M', 'MAX'].map(r => fetchHistorical(r))).then(results => {
        ['1W', '1M', 'MAX'].forEach((r, i) => {
          cache.ratio[r] = results[i].ratio;
          cache.price[r] = results[i].price;
        });
        // Persist everything to localStorage
        saveToStorage({ ratio: cache.ratio, price: cache.price });
      });

      // Auto-refresh prices every 60s
      setInterval(async () => {
        const p = await fetchCurrentPrices();
        if (p) {
          ratioEl.textContent = p.ratio.toFixed(2);
          priceEl.textContent = '$' + p.zec.toFixed(2);
        }
      }, 60000);
    }

    init();
  </script>

  <!-- Pixel Wave Animation -->
  <script>
    (function() {
      const c = document.getElementById('pixelWave');
      const ctx = c.getContext('2d');
      const PX = 4;           // pixel block size
      let cols, rows, w, h;

      function resize() {
        w = c.clientWidth;
        h = c.clientHeight;
        c.width = w;
        c.height = h;
        cols = Math.ceil(w / PX);
        rows = Math.ceil(h / PX);
      }
      resize();
      window.addEventListener('resize', resize);

      function draw(t) {
        ctx.clearRect(0, 0, w, h);
        const s = t * 0.001;

        for (let x = 0; x < cols; x++) {
          // layered sine waves for organic movement
          const wave1 = Math.sin(x * 0.06 + s * 0.8) * 0.35;
          const wave2 = Math.sin(x * 0.12 + s * 1.3) * 0.2;
          const wave3 = Math.sin(x * 0.03 + s * 0.4) * 0.25;
          const waveHeight = (wave1 + wave2 + wave3 + 0.8) * 0.5; // normalized 0..1

          const peakRow = Math.floor((1 - waveHeight) * rows);

          for (let y = peakRow; y < rows; y++) {
            const depth = (y - peakRow) / (rows - peakRow); // 0 at peak, 1 at bottom
            const alpha = (1 - depth) * 0.6;                // fade toward bottom

            // glow: brighter near peak
            if (y === peakRow) {
              ctx.fillStyle = `rgba(245, 200, 66, ${alpha * 0.9})`;
            } else if (y === peakRow + 1) {
              ctx.fillStyle = `rgba(212, 160, 23, ${alpha * 0.7})`;
            } else {
              ctx.fillStyle = `rgba(138, 106, 10, ${alpha * 0.5})`;
            }

            ctx.fillRect(x * PX, y * PX, PX - 1, PX - 1); // -1 for pixel gap
          }
        }

        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
